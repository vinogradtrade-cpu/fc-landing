name: Deploy fc-landing

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-fc-landing
  cancel-in-progress: false

env:
  APP_NAME: fc-landing
  APP_DIR: /opt/fc-landing
  KEEP_RELEASES: 5

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build artifact
        run: |
          set -euo pipefail
          tar --exclude='./.git' \
              --exclude='./.github' \
              --exclude='./deploy' \
              --exclude='./node_modules' \
              --exclude='./.DS_Store' \
              --exclude='**/.DS_Store' \
              --exclude='./.env' \
              --exclude='./.env.*' \
              -czf "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz" .
          ls -lh "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz"

      - name: Upload to VPS
        run: |
          set -euo pipefail
          scp -P "${{ secrets.VPS_PORT || '22' }}" \
              -o StrictHostKeyChecking=accept-new \
              "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz" \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz"

      - name: Activate release
        env:
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.VPS_PORT || '22' }}" \
              -o StrictHostKeyChecking=accept-new \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              APP_DIR="$APP_DIR" \
              APP_NAME="$APP_NAME" \
              KEEP_RELEASES="$KEEP_RELEASES" \
              GITHUB_SHA="$GITHUB_SHA" \
              PUBLIC_HOST="$PUBLIC_HOST" \
              'bash -se' <<'REMOTE'
          set -euo pipefail

          : "${APP_DIR:?missing}"
          : "${APP_NAME:?missing}"
          : "${GITHUB_SHA:?missing}"
          : "${KEEP_RELEASES:=5}"

          if [ ! -d "$APP_DIR" ] || [ ! -d "$APP_DIR/releases" ] || [ ! -d "$APP_DIR/shared" ]; then
            echo "ERROR: $APP_DIR is not bootstrapped. Run bootstrap from deploy/README.md first." >&2
            exit 1
          fi

          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          mkdir -p "$RELEASE_DIR"

          tar -xzf "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz" -C "$RELEASE_DIR"
          rm -f "/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz"

          # nginx читает напрямую из current/ — переключение симлинка атомарно.
          ln -sfn "$RELEASE_DIR" "$APP_DIR/current.new"
          mv -Tf "$APP_DIR/current.new" "$APP_DIR/current"

          # Очистка старых релизов: оставляем последние KEEP_RELEASES + текущий.
          cd "$APP_DIR/releases"
          ls -1t | tail -n +"$((KEEP_RELEASES + 1))" | while read -r old; do
            if [ "$old" != "$GITHUB_SHA" ]; then
              rm -rf -- "$old"
            fi
          done

          echo "Activated release: $GITHUB_SHA"
          ls -la "$APP_DIR/current"
          REMOTE

      - name: Healthcheck
        env:
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
        run: |
          set -euo pipefail
          if [ -z "${PUBLIC_HOST:-}" ]; then
            echo "PUBLIC_HOST secret not set — skipping public healthcheck."
            exit 0
          fi
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://${PUBLIC_HOST}/" || true)
            echo "Attempt ${i}: HTTP ${code}"
            if [ "${code}" = "200" ]; then
              echo "Healthcheck OK"
              exit 0
            fi
            sleep 3
          done
          echo "Healthcheck FAILED" >&2
          exit 1
